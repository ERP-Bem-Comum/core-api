openapi: 3.1.0

# ============================================================================
#  ERP Bem Comum — Contrato de API (módulos NÃO financeiro / NÃO contratos / NÃO auth)
# ----------------------------------------------------------------------------
#  Esta especificação foi gerada a partir da fonte de verdade REAL do backend
#  (NestJS): controllers em `src/modules/*/**.controller.ts`, DTOs (class-validator),
#  entities (TypeORM) e enums. Onde o "contrato esperado pelo front" divergia do
#  backend, a divergência está anotada com  ⚠️ DIVERGÊNCIA  na descrição do recurso.
#
#  Convenção de envelope (axios `return response.data`):
#    - Recurso único       → o objeto direto (ex.: GET /programs/{id} → Program)
#    - Listagem paginada   → { items: T[], meta: PaginationMeta, links?: PaginationLinks }
#                            (nestjs-typeorm-paginate)
#    - Erro                → { message, statusCode?, error? }  (padrão NestJS HttpException)
#    - Mutações (POST/PUT/PATCH/DELETE) → na maioria retornam corpo VAZIO (void).
#      O front ignora o corpo nesses casos. Documentado como 200/201/204 sem schema.
# ============================================================================

info:
  title: ERP Bem Comum — API (Parceiros, Programas, Usuários, Orçamento, Relatórios)
  version: "1.0.0"
  description: |
    Contrato dos módulos transversais e de planejamento orçamentário do ERP.

    **Fora do escopo deste arquivo** (possuem/terão documentação própria):
    `auth` (`/auth/*`), `contratos` (`/contracts/*`) e `financeiro`
    (`/payables`, `/receivables`, `/accounts`, `/cards`, `/card-movimentations`,
    `/bank-reconciliation`, `/apiBradesco/*`). As rotas de `/files/*` aparecem aqui
    apenas porque o **service de arquivos é compartilhado** — `payable`/`receivable`
    pertencem ao financeiro e `contracts*` aos contratos.

    ### Autenticação
    - **bearerAuth** (JWT): padrão da maioria dos endpoints. Header `Authorization: Bearer <jwt>`.
    - **jwtOrBasic**: endpoints `/options` aceitam Bearer **ou** Basic Auth (cliente `apiOptions`).
    - **basicAuth** (compartilhamento externo): endpoints `*/shared` usam
      `Authorization: Basic base64(shareUsername:sharePassword)`. As credenciais vêm de
      cookies preenchidos após `POST /share-budget-plans/check-credentials`.

    ### Valores monetários
    Campos com sufixo `InCents` são **inteiros em centavos** (`bigint` no banco). Nunca floats.
  contact:
    name: Time Envolve / Bem Comum
  license:
    name: Proprietário

servers:
  - url: http://localhost:4010
    description: Desenvolvimento local (default `NEXT_PUBLIC_API_URL`)
  - url: https://api.staging.bemcomum.org
    description: Homologação (exemplo — ajustar)
  - url: https://api.bemcomum.org
    description: Produção (exemplo — ajustar)

# ----------------------------------------------------------------------------
#  TAGS
# ----------------------------------------------------------------------------
tags:
  - name: Colaboradores
    description: Gestão de parceiros — colaboradores (PJ/CLT), histórico e importação.
  - name: Financiadores
    description: Gestão de parceiros — financiadores (doadores / fontes de recurso).
  - name: Fornecedores
    description: Gestão de parceiros — fornecedores e seus dados de pagamento.
  - name: Estados Parceiros
    description: Catálogo de estados (UF) parceiros.
  - name: Municípios Parceiros
    description: Catálogo de municípios parceiros (código IBGE).
  - name: Programas
    description: Programas institucionais (com logo e diretor).
  - name: Usuários
    description: Usuários do sistema (autenticáveis), troca de senha e avatar.
  - name: Planos Orçamentários
    description: Planos orçamentários anuais, versões/cenários (árvore), aprovação e calibração.
  - name: Orçamentos
    description: Orçamentos por estado/município dentro de um plano.
  - name: Resultados dos Orçamentos
    description: Memória de cálculo (IPCA, CAED, Despesas Pessoais, Despesas Logísticas).
  - name: Centros de Custo
    description: Centros de custo, categorias e subcategorias (árvore do plano).
  - name: Compartilhar Planos Orçamentários
    description: Geração/validação de links externos de compartilhamento.
  - name: Relatórios
    description: Relatórios analíticos e exports (CSV/PDF).
  - name: Estatísticas
    description: Dashboard consolidado.
  - name: Arquivos
    description: Upload/download genérico (transversal a vários domínios).

# ----------------------------------------------------------------------------
#  SECURITY (default global = bearerAuth; overrides por operação)
# ----------------------------------------------------------------------------
security:
  - bearerAuth: []

paths:

  # ==========================================================================
  #  1.1 COLABORADORES
  # ==========================================================================
  /collaborators:
    get:
      tags: [Colaboradores]
      summary: Listar colaboradores (paginado, multifiltro)
      operationId: listCollaborators
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Active'
        - $ref: '#/components/parameters/Order'
        - { name: age, in: query, schema: { type: string }, description: Idade (string conforme DTO). }
        - { name: yearOfContract, in: query, schema: { type: string }, description: Ano de início de contrato. }
        - name: genderIdentities
          in: query
          style: form
          explode: true
          schema: { type: array, items: { $ref: '#/components/schemas/GenderIdentity' } }
        - name: breeds
          in: query
          style: form
          explode: true
          schema: { type: array, items: { $ref: '#/components/schemas/Race' } }
        - name: educations
          in: query
          style: form
          explode: true
          schema: { type: array, items: { $ref: '#/components/schemas/Education' } }
        - name: status
          in: query
          style: form
          explode: true
          schema: { type: array, items: { $ref: '#/components/schemas/RegistrationStatus' } }
        - name: occupationAreas
          in: query
          style: form
          explode: true
          schema: { type: array, items: { $ref: '#/components/schemas/OccupationArea' } }
        - name: employmentRelationships
          in: query
          style: form
          explode: true
          schema: { type: array, items: { $ref: '#/components/schemas/EmploymentRelationship' } }
        - name: disableBy
          in: query
          style: form
          explode: true
          schema: { type: array, items: { $ref: '#/components/schemas/DisableBy' } }
        - name: roles
          in: query
          style: form
          explode: true
          schema: { type: array, items: { type: string } }
      responses:
        '200':
          description: Página de colaboradores.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedCollaborators' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Colaboradores]
      summary: Criar colaborador (pré-cadastro)
      description: |
        Cria um colaborador no estado `PRE_CADASTRO`. ⚠️ DIVERGÊNCIA: o backend valida
        `occupationArea` como **enum** (`PARC|DDI|DCE|EPV`) e `employmentRelationship`
        como **enum** (`CLT|PJ`), não como string livre. Resposta sem corpo (void).
      operationId: createCollaborator
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCollaborator' }
      responses:
        '201': { $ref: '#/components/responses/CreatedNoBody' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /collaborators/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Colaboradores]
      summary: Obter colaborador completo
      operationId: getCollaborator
      responses:
        '200':
          description: Colaborador.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Collaborator' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Colaboradores]
      summary: Atualizar colaborador
      operationId: updateCollaborator
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCollaborator' }
      responses:
        '200': { $ref: '#/components/responses/OkNoBody' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /collaborators/{id}/toggle-active:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    patch:
      tags: [Colaboradores]
      summary: Ativar/inativar colaborador
      description: Ao inativar, informe o motivo em `disableBy`.
      operationId: toggleCollaboratorActive
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                disableBy:
                  oneOf:
                    - { $ref: '#/components/schemas/DisableBy' }
                    - { type: 'null' }
      responses:
        '200': { $ref: '#/components/responses/OkNoBody' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /collaborators/{id}/complete-registration:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Colaboradores]
      summary: Completar cadastro do colaborador
      description: |
        Rota **pública** (sem JwtAuthGuard no controller) usada no fluxo de auto-cadastro
        do colaborador. Promove o status para `CADASTRO_COMPLETO`.
      operationId: completeCollaboratorRegistration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompleteRegistrationCollaborator' }
      responses:
        '200': { $ref: '#/components/responses/OkNoBody' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /collaborators/{id}/check-first-three-numbers-cpf/{cpf}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
      - { name: cpf, in: path, required: true, schema: { type: string }, description: Três primeiros dígitos (ou CPF) a validar. }
    get:
      tags: [Colaboradores]
      summary: Validar 3 primeiros dígitos do CPF
      description: Rota pública usada no fluxo de auto-cadastro para conferência de identidade.
      operationId: checkFirstThreeNumbersCpf
      security: []
      responses:
        '200':
          description: Colaborador correspondente (quando validado).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Collaborator' }

  /collaborators/nameOrCPF:
    get:
      tags: [Colaboradores]
      summary: Buscar 1 colaborador por nome ou CPF
      operationId: findCollaboratorByNameOrCpf
      parameters:
        - { name: nameOrCPF, in: query, required: true, schema: { type: string } }
        - { name: payableOrReceivableId, in: query, required: false, schema: { type: integer } }
      responses:
        '200':
          description: Colaborador encontrado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Collaborator' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /collaborators/options:
    get:
      tags: [Colaboradores]
      summary: Options de colaboradores (dropdown)
      operationId: collaboratorOptions
      security:
        - bearerAuth: []
        - basicAuth: []
      responses:
        '200': { $ref: '#/components/responses/OptionsList' }

  /collaborators/food-categories/options:
    get:
      tags: [Colaboradores]
      summary: Options de categorias alimentares
      description: Retorna `value`, `label` e `description` para cada `FoodCategory`.
      operationId: foodCategoryOptions
      security:
        - bearerAuth: []
        - basicAuth: []
      responses:
        '200':
          description: Lista de opções de categoria alimentar.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    value: { $ref: '#/components/schemas/FoodCategory' }
                    label: { type: string }
                    description: { type: string }

  /collaborators/data:
    get:
      tags: [Colaboradores]
      summary: Dados cadastrais (formato exportação Excel, paginado)
      description: Mesmo conjunto de filtros da listagem; formato voltado a BI.
      operationId: collaboratorData
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Dados cadastrais paginados.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { type: object, additionalProperties: true }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /collaborators/csv:
    get:
      tags: [Colaboradores]
      summary: Exportar colaboradores (CSV)
      operationId: collaboratorsCsv
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Active'
      responses:
        '200': { $ref: '#/components/responses/CsvBlob' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /collaborators/timeline/csv:
    get:
      tags: [Colaboradores]
      summary: Exportar timeline de colaboradores (CSV tabular por período)
      description: Uma linha por período por colaborador. Ideal para BigQuery/BI.
      operationId: collaboratorsTimelineCsv
      responses:
        '200': { $ref: '#/components/responses/CsvBlob' }
        '404': { $ref: '#/components/responses/NotFound' }

  /collaborators/import:
    post:
      tags: [Colaboradores]
      summary: Importar colaboradores via CSV
      description: |
        Apenas insere novos colaboradores (não atualiza). Valida unicidade por CPF, Email e RG.
        Pode retornar importação **parcial** com a lista de `errors` por linha.
      operationId: importCollaborators
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary, description: Arquivo .csv com colunas da exportação. }
      responses:
        '200':
          description: Resultado da importação.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /collaborators/history/import:
    post:
      tags: [Colaboradores]
      summary: Importar histórico de colaboradores (CSV/Excel)
      description: Alimenta a base retroativamente com dados anteriores à implementação.
      operationId: importCollaboratorHistory
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        '200':
          description: Resultado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  imported: { type: integer }
                  errors: { type: array, items: { type: string } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /collaborators/history/migrate-occupation-area:
    post:
      tags: [Colaboradores]
      summary: Migrar Área de Atuação no histórico legado
      description: Popula retroativamente `newOccupationArea`. Executar uma única vez após atualização.
      operationId: migrateOccupationArea
      responses:
        '200':
          description: Migração concluída.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  updated: { type: integer }
                  skipped: { type: integer }
                  message: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ==========================================================================
  #  1.2 FINANCIADORES
  # ==========================================================================
  /financiers:
    get:
      tags: [Financiadores]
      summary: Listar financiadores (paginado)
      operationId: listFinanciers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: Página de financiadores.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      items: { type: array, items: { $ref: '#/components/schemas/Financier' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Financiadores]
      summary: Criar financiador
      operationId: createFinancier
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateFinancier' }
      responses:
        '201': { $ref: '#/components/responses/CreatedNoBody' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /financiers/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Financiadores]
      summary: Obter financiador
      operationId: getFinancier
      responses:
        '200':
          description: Financiador.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Financier' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Financiadores]
      summary: Atualizar financiador
      operationId: updateFinancier
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateFinancier' }
      responses:
        '200': { $ref: '#/components/responses/OkNoBody' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /financiers/{id}/toggle-active:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    patch:
      tags: [Financiadores]
      summary: Ativar/inativar financiador
      operationId: toggleFinancierActive
      responses:
        '200': { $ref: '#/components/responses/OkNoBody' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /financiers/nameOrCNPJ:
    get:
      tags: [Financiadores]
      summary: Buscar 1 financiador por nome ou CNPJ
      operationId: findFinancierByNameOrCnpj
      parameters:
        - { name: nameOrCNPJ, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Financiador encontrado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Financier' }

  /financiers/options:
    get:
      tags: [Financiadores]
      summary: Options de financiadores
      operationId: financierOptions
      security:
        - bearerAuth: []
        - basicAuth: []
      responses:
        '200': { $ref: '#/components/responses/OptionsList' }

  # ==========================================================================
  #  1.3 FORNECEDORES
  # ==========================================================================
  /suppliers:
    get:
      tags: [Fornecedores]
      summary: Listar fornecedores (paginado)
      operationId: listSuppliers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Active'
        - $ref: '#/components/parameters/Order'
        - name: categories
          in: query
          style: form
          explode: true
          schema: { type: array, items: { $ref: '#/components/schemas/CategorySupplier' } }
      responses:
        '200':
          description: Página de fornecedores.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      items: { type: array, items: { $ref: '#/components/schemas/Supplier' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Fornecedores]
      summary: Criar fornecedor
      operationId: createSupplier
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSupplier' }
      responses:
        '201': { $ref: '#/components/responses/CreatedNoBody' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /suppliers/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Fornecedores]
      summary: Obter fornecedor
      operationId: getSupplier
      responses:
        '200':
          description: Fornecedor.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Supplier' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Fornecedores]
      summary: Atualizar fornecedor (cadastro OU dados de pagamento)
      description: |
        `UpdateSupplierDto = PartialType(CreateSupplierDto)` — todos os campos opcionais.
        Usado tanto para (A) editar dados cadastrais quanto (B) gravar `bancaryInfo`/`pixInfo`.
        Validação cruzada exige **pelo menos um** entre dados bancários ou Pix preenchidos.
      operationId: updateSupplier
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSupplier' }
      responses:
        '200': { $ref: '#/components/responses/OkNoBody' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /suppliers/{id}/toggle-active:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    patch:
      tags: [Fornecedores]
      summary: Ativar/inativar fornecedor
      operationId: toggleSupplierActive
      responses:
        '200': { $ref: '#/components/responses/OkNoBody' }

  /suppliers/nameOrCNPJ:
    get:
      tags: [Fornecedores]
      summary: Buscar 1 fornecedor por nome ou CNPJ
      operationId: findSupplierByNameOrCnpj
      parameters:
        - { name: nameOrCNPJ, in: query, required: true, schema: { type: string } }
        - { name: payableOrReceivableId, in: query, required: false, schema: { type: integer } }
      responses:
        '200':
          description: Fornecedor encontrado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Supplier' }

  /suppliers/options:
    get:
      tags: [Fornecedores]
      summary: Options de fornecedores
      operationId: supplierOptions
      security:
        - bearerAuth: []
        - basicAuth: []
      responses:
        '200': { $ref: '#/components/responses/OptionsList' }

  /suppliers/csv:
    get:
      tags: [Fornecedores]
      summary: Exportar fornecedores (CSV)
      operationId: suppliersCsv
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Active'
      responses:
        '200': { $ref: '#/components/responses/CsvBlob' }

  # ==========================================================================
  #  1.4 ESTADOS PARCEIROS
  # ==========================================================================
  /partner-states:
    get:
      tags: [Estados Parceiros]
      summary: Listar estados parceiros (array simples, sem paginação)
      operationId: listPartnerStates
      responses:
        '200':
          description: Lista de estados.
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/PartnerState' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Estados Parceiros]
      summary: Criar estado parceiro
      operationId: createPartnerState
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePartnerState' }
      responses:
        '201': { $ref: '#/components/responses/CreatedNoBody' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /partner-states/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Estados Parceiros]
      summary: Obter estado parceiro
      operationId: getPartnerState
      responses:
        '200':
          description: Estado.
          content:
