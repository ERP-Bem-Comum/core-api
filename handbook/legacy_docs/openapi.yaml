  # ==========================================================================
  #  7. ARQUIVOS (transversal)
  # ==========================================================================
  /files:
    get:
      tags: [Arquivos]
      summary: Download de arquivo por URL
      operationId: downloadFile
      parameters:
        - { name: fileUrl, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Conteúdo binário do arquivo.
          headers:
            Content-Disposition:
              schema: { type: string }
              description: 'attachment; filename="..."'
          content:
            application/octet-stream: { schema: { type: string, format: binary } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /files/{path}:
    parameters:
      - name: path
        in: path
        required: true
        schema: { type: string, enum: [payable, receivable, contracts] }
        description: |
          Destino do anexo. `payable`/`receivable` → financeiro; `contracts` → contratos.
          (O backend expõe rotas fixas `/files/payable`, `/files/receivable`, `/files/contracts`;
          aqui são unificadas como parâmetro de caminho.)
    post:
      tags: [Arquivos]
      summary: Anexar arquivos (multipart, múltiplos)
      operationId: createFiles
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: '#/components/schemas/CreateFilesMultipart' }
      responses:
        '201': { $ref: '#/components/responses/CreatedNoBody' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      tags: [Arquivos]
      summary: Atualizar arquivos (multipart, múltiplos)
      operationId: updateFiles
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: '#/components/schemas/UpdateFilesMultipart' }
      responses:
        '200': { $ref: '#/components/responses/OkNoBody' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

# ============================================================================
#  COMPONENTS
# ============================================================================
components:

  # --------------------------------------------------------------------------
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT do usuário (Authorization: Bearer <jwt>).'
    basicAuth:
      type: http
      scheme: basic
      description: 'Basic base64(shareUsername:sharePassword) para endpoints */shared.'

  # --------------------------------------------------------------------------
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
      description: ID numérico do recurso (validado por ParseNumericIdPipe).
    Page:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }
      description: Página (1-indexed).
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 5 }
      description: Itens por página.
    Search:
      name: search
      in: query
      required: false
      schema: { type: string, nullable: true }
    Active:
      name: active
      in: query
      required: false
      schema: { type: integer, enum: [0, 1], nullable: true }
      description: 0 = inativo, 1 = ativo.
    Order:
      name: order
      in: query
      required: false
      schema: { type: string, enum: [ASC, DESC], default: ASC }
    ReportFilters:
      name: reportFilters
      in: query
      required: false
      description: |
        Filtros achatados (`flattenParams`) compartilhados pelos relatórios. Cada propriedade
        de `ReportFilters` vira um query param plano; `dueBetween` é enviado como
        `dueBetween.start` / `dueBetween.end` (datas ISO). Valores null/undefined são removidos.
      style: deepObject
      explode: true
      schema: { $ref: '#/components/schemas/ReportFilters' }

  # --------------------------------------------------------------------------
  responses:
    OkNoBody:
      description: Operação realizada com sucesso (sem corpo de retorno).
    CreatedNoBody:
      description: Recurso criado (o backend retorna void; o front ignora o corpo).
    OptionsList:
      description: Lista de opções para dropdown.
      content:
        application/json:
          schema:
            type: array
            items: { $ref: '#/components/schemas/Option' }
    CsvBlob:
      description: Arquivo CSV (blob binário). Nome no header Content-Disposition.
      headers:
        Content-Disposition:
          schema: { type: string }
      content:
        text/csv:
          schema: { type: string, format: binary }
    PdfBlob:
      description: Arquivo PDF (blob binário).
      headers:
        Content-Disposition:
          schema: { type: string }
      content:
        application/pdf:
          schema: { type: string, format: binary }
    BadRequest:
      description: Requisição inválida (validação class-validator).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: |
        Não autenticado. Em `{ message: "Unauthorized" }` com 401 o front faz logout automático.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Recurso não encontrado.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  # --------------------------------------------------------------------------
  schemas:

    # ---------- Envelopes / utilitários ----------
    PaginationMeta:
      type: object
      description: Metadados de paginação (nestjs-typeorm-paginate).
      properties:
        itemCount: { type: integer, description: Itens na página atual. }
        totalItems: { type: integer, description: Total na base. }
        itemsPerPage: { type: integer, description: '= limit.' }
        totalPages: { type: integer }
        currentPage: { type: integer, description: 1-indexed. }
      required: [itemCount, totalItems, itemsPerPage, totalPages, currentPage]
    PaginationLinks:
      type: object
      properties:
        first: { type: string }
        previous: { type: string }
        next: { type: string }
        last: { type: string }
    PaginatedEnvelope:
      type: object
      properties:
        items: { type: array, items: { type: object } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }
        links: { $ref: '#/components/schemas/PaginationLinks' }
      required: [items, meta]
    Option:
      type: object
      properties:
        id: { oneOf: [ { type: integer }, { type: string } ] }
        parentId: { type: integer }
        name: { type: string }
      required: [id, name]
    ErrorResponse:
      type: object
      properties:
        message:
          oneOf:
            - { type: string }
            - { type: array, items: { type: string } }
        statusCode: { type: integer }
        error: { type: string }
      required: [message]
    PixInfo:
      type: object
      properties:
        key_type: { $ref: '#/components/schemas/PixTypes' }
        key: { type: string, nullable: true }
    BancaryInfo:
      type: object
      properties:
        bank: { type: string, nullable: true }
        agency: { type: string, nullable: true, pattern: '^(\d{4}-\d{1})?$', description: 'Formato 0000-0.' }
        accountNumber: { type: string, nullable: true }
        dv: { type: string, nullable: true, maxLength: 1 }

    # ---------- Enums ----------
    GenderIdentity:
      type: string
      enum: [PREFIRO_NAO_RESPONDER, HOMEM_CIS, HOMEM_TRANS, MULHER_CIS, MULHER_TRANS, TRAVESTI, NAO_BINARIO, OUTRO]
    Race:
      type: string
      enum: [AMARELO, BRANCO, PARDO, INDIGENA, PRETO, PREFIRO_NAO_RESPONDER]
    Education:
      type: string
      enum: [EDUCACAO_INFANTIL, ENSINO_FUNDAMENTAL, ENSINO_MEDIO, ENSINO_SUPERIOR, POS_GRADUACAO, MESTRADO, DOUTORADO]
    OccupationArea:
      type: string
      enum: [PARC, DDI, DCE, EPV]
      description: '⚠️ Enum real do backend (não string livre).'
    EmploymentRelationship:
      type: string
      enum: [CLT, PJ]
      description: '⚠️ Enum real do backend (apenas CLT/PJ).'
    RegistrationStatus:
      type: string
      enum: [PRE_CADASTRO, CADASTRO_COMPLETO]
      description: '⚠️ Valores reais do backend.'
    FoodCategory:
      type: string
      enum: [ONIVORO, VEGANO, VEGETARIANO, PESCETARIANO, OUTRO, PREFIRO_NAO_RESPONDER]
    DisableBy:
      type: string
      enum: [DESLIGAMENTO_ABC, FALECIMENTO, TEMPO_CONTRATO_FINALIZADO, SOLICITACAO_RESCISAO_CONTRATUAL]
    CategorySupplier:
      type: string
      enum:
        [AGUA, ALIMENTACAO, AR_CONDICIONADO, ASSESSORIA, AUDITORIA_EXTERNA, BUFFET,
         COMPRAS_E_SUPRIMENTOS, CONSULTORIA, CONTABEIS, DEDETIZACAO, ELETRICO,
         EMISSAO_DE_PASSAGEM, ENERGIA, ENTREGA, ESGOTO, GRAFICA, HIDRAULICO,
         INFORMATICA, INTERNET, JURIDICO, LAVAGEM, LIMPEZA, LOCATICIOS, MANUTENCAO,
         MARCENARIA, MATERIAL_DE_CONSUMO, MATERIAL_DE_INFORMATICA, MATERIAL_DE_LIMPEZA,
         MATERIAL_EXPEDIENTE, OBRAS, ONGANIZACAO_DE_EVENTOS, PINTURA, PRODUCAO,
         RESERVA_DE_HOSPEDAGEM, SEGURANCA, SERVICOS_ADMINISTRATIVOS, TRASPORTE,
         VIDRACARIA, BANCO]
    PixTypes:
      type: string
      enum: [CPF, CNPJ, EMAIL, CELLPHONE, ALEATORY_KEY]
      nullable: true
    BudgetPlanStatus:
      type: string
      enum: [APROVADO, EM_CALIBRACAO, RASCUNHO]
    CostCenterType:
      type: string
      enum: ['A PAGAR', 'A RECEBER']
    SubCategoryType:
      type: string
      enum: [INSTITUCIONAL, REDE]
    SubCategoryReleaseType:
      type: string
      enum: [IPCA, CAED, DESPESAS_PESSOAIS, DESPESAS_LOGISTICAS]
    ReportType:
      type: string
      enum: [RECEIVABLE, PAYABLE]
    ReportStatus:
      type: string
      description: União de PayableStatus + ReceivableStatus usada nos filtros de relatório.
      enum: ['PENDENTE', 'EM APROVAÇÃO', 'LANÇADO', 'NÃO EFETIVADO', 'EFETIVADO', 'ATRASADO', 'CONCLUIDO', 'APROVADO', 'RECEBIDO']
    GeneralReportColumn:
      type: string
      enum: [NUMERO_CONTRATO, TIPO, CODE, VENCIMENTO, PARCELA, APONTAMENTO, FORNECEDOR, FINANCIADOR, COLABORADOR, CENTRO_CUSTO, CATEGORIA, SUB_CATEGORIA, PIX, BANCARY]

    # ---------- Colaboradores ----------
    Collaborator:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        cpf: { type: string, minLength: 11, maxLength: 11 }
        rg: { type: string, nullable: true }
        occupationArea: { $ref: '#/components/schemas/OccupationArea' }
        role: { type: string, nullable: true }
        startOfContract: { type: string, format: date-time }
        dateOfBirth: { type: string, format: date-time, nullable: true }
        employmentRelationship: { $ref: '#/components/schemas/EmploymentRelationship' }
        genderIdentity: { $ref: '#/components/schemas/GenderIdentity' }
        race: { $ref: '#/components/schemas/Race' }
        education: { $ref: '#/components/schemas/Education' }
        foodCategory: { $ref: '#/components/schemas/FoodCategory' }
        foodCategoryDescription: { type: string, nullable: true }
        disableBy: { $ref: '#/components/schemas/DisableBy' }
        status: { $ref: '#/components/schemas/RegistrationStatus' }
        biography: { type: string, nullable: true }
        completeAddress: { type: string, nullable: true }
        allergies: { type: string, nullable: true }
        telephone: { type: string, nullable: true }
        emergencyContactName: { type: string, nullable: true }
        emergencyContactTelephone: { type: string, nullable: true }
        experienceInThePublicSector: { type: boolean, nullable: true }
        active: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, email, cpf, occupationArea, startOfContract, employmentRelationship, status, active]
    CreateCollaborator:
      type: object
      required: [name, email, cpf, occupationArea, role, startOfContract, employmentRelationship]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        cpf: { type: string, minLength: 11, maxLength: 11, description: 'Apenas dígitos (sanitizado).' }
        occupationArea: { $ref: '#/components/schemas/OccupationArea' }
        role: { type: string }
        startOfContract: { type: string, format: date, description: ISO date. }
        employmentRelationship: { $ref: '#/components/schemas/EmploymentRelationship' }
    UpdateCollaborator:
      allOf:
        - $ref: '#/components/schemas/CreateCollaborator'
        - type: object
          description: Campos cadastrais completos (mesmos do create, todos editáveis).
    CompleteRegistrationCollaborator:
      type: object
      description: Payload de auto-cadastro (campos pessoais completos).
      additionalProperties: true
      properties:
        rg: { type: string }
        dateOfBirth: { type: string, format: date }
        genderIdentity: { $ref: '#/components/schemas/GenderIdentity' }
        race: { $ref: '#/components/schemas/Race' }
        education: { $ref: '#/components/schemas/Education' }
        foodCategory: { $ref: '#/components/schemas/FoodCategory' }
        completeAddress: { type: string }
        telephone: { type: string }
        emergencyContactName: { type: string }
        emergencyContactTelephone: { type: string }
        allergies: { type: string }
        biography: { type: string }
        experienceInThePublicSector: { type: boolean }
    PaginatedCollaborators:
      allOf:
        - $ref: '#/components/schemas/PaginatedEnvelope'
        - type: object
          properties:
            items: { type: array, items: { $ref: '#/components/schemas/Collaborator' } }
    ImportResult:
      type: object
      properties:
        success: { type: boolean }
        imported: { type: integer }
        message: { type: string }
        isPartialImport: { type: boolean }
        errors:
          type: array
          items:
            type: object
            properties:
              line: { type: integer }
              message: { type: string }
              rowData: { type: object, additionalProperties: true }

    # ---------- Financiadores ----------
    Financier:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        corporateName: { type: string }
        legalRepresentative: { type: string }
        cnpj: { type: string, minLength: 14, maxLength: 14 }
        telephone: { type: string }
        address: { type: string }
        active: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, corporateName, legalRepresentative, cnpj, telephone, address, active]
    CreateFinancier:
      type: object
      required: [name, corporateName, legalRepresentative, cnpj, telephone, address]
      properties:
        name: { type: string }
        corporateName: { type: string }
        legalRepresentative: { type: string }
        cnpj: { type: string, minLength: 14, maxLength: 14 }
        telephone: { type: string }
        address: { type: string }

    # ---------- Fornecedores ----------
    Supplier:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        cnpj: { type: string, minLength: 14, maxLength: 14 }
        corporateName: { type: string }
        fantasyName: { type: string }
        serviceCategory: { $ref: '#/components/schemas/CategorySupplier' }
        serviceEvaluation: { type: integer, nullable: true }
        commentEvaluation: { type: string, nullable: true }
        bancaryInfo: { $ref: '#/components/schemas/BancaryInfo' }
        pixInfo: { $ref: '#/components/schemas/PixInfo' }
        active: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, email, cnpj, corporateName, fantasyName, serviceCategory, active]
    CreateSupplier:
      type: object
      required: [name, email, cnpj, corporateName, fantasyName, serviceCategory]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        cnpj: { type: string, minLength: 14, maxLength: 14 }
        corporateName: { type: string }
        fantasyName: { type: string }
        serviceCategory: { $ref: '#/components/schemas/CategorySupplier' }
        serviceEvaluation: { type: integer, nullable: true }
        commentEvaluation: { type: string, nullable: true }
        bancaryInfo: { $ref: '#/components/schemas/BancaryInfo' }
        pixInfo: { $ref: '#/components/schemas/PixInfo' }
    UpdateSupplier:
      type: object
      description: PartialType de CreateSupplier — todos opcionais. Para (B) info de pagamento envie bancaryInfo OU pixInfo.
      properties:
        name: { type: string }
        email: { type: string, format: email }
        cnpj: { type: string }
        corporateName: { type: string }
        fantasyName: { type: string }
        serviceCategory: { $ref: '#/components/schemas/CategorySupplier' }
        serviceEvaluation: { type: integer, nullable: true }
        commentEvaluation: { type: string, nullable: true }
        bancaryInfo: { $ref: '#/components/schemas/BancaryInfo' }
        pixInfo: { $ref: '#/components/schemas/PixInfo' }
        updatedBy: { type: integer }

    # ---------- Estados / Municípios ----------
    PartnerState:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        abbreviation: { type: string, maxLength: 2 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, abbreviation]
    CreatePartnerState:
      type: object
      required: [name, abbreviation]
      properties:
        name: { type: string }
        abbreviation: { type: string, maxLength: 2 }
    PartnerMunicipality:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        uf: { type: string, maxLength: 2 }
        cod: { type: string, description: Código IBGE. }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, uf, cod]
    CreatePartnerMunicipality:
      type: object
      required: [name, uf, cod]
      properties:
        name: { type: string }
        uf: { type: string, maxLength: 2 }
        cod: { type: string }

    # ---------- Programas ----------
    Program:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        abbreviation: { type: string }
        director: { type: string }
        description: { type: string }
        logo: { type: string, nullable: true }
        active: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, abbreviation, director, description, active]
    CreateProgramMultipart:
      type: object
      required: [abbreviation, director, description]
      properties:
        name: { type: string }
        abbreviation: { type: string }
        director: { type: string }
        description: { type: string }
        file: { type: string, format: binary, description: 'Logo (.png/.jpeg/.jpg).' }

    # ---------- Usuários ----------
    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        cpf: { type: string, minLength: 11, maxLength: 11 }
        telephone: { type: string }
        imageUrl: { type: string, nullable: true }
        active: { type: boolean }
        massApprovalPermission: { type: boolean }
        collaboratorId: { type: integer, nullable: true }
        token: { type: string, description: 'Presente em respostas de auth; pode não vir em listagens.' }
      required: [id, name, email, cpf, telephone]
    CreateUserMultipart:
      type: object
      required: [name, email, cpf, telephone, massApprovalPermission]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        cpf: { type: string, minLength: 11, maxLength: 11 }
        telephone: { type: string }
        massApprovalPermission: { type: boolean }
        collaboratorId: { type: integer, nullable: true }
        file: { type: string, format: binary, description: 'Avatar (.png/.jpeg/.jpg).' }
    ChangePassword:
      type: object
      required: [password, currentPassword]
      properties:
        password: { type: string, description: Nova senha. }
        currentPassword: { type: string }

    # ---------- Planos Orçamentários ----------
    BudgetPlan:
      type: object
      properties:
        id: { type: integer }
        year: { type: integer }
        scenarioName: { type: string, nullable: true }
        version: { type: number }
        totalInCents: { type: integer, format: int64 }
        status: { $ref: '#/components/schemas/BudgetPlanStatus' }
        programId: { type: integer }
        updatedById: { type: integer }
        parentId: { type: integer, nullable: true }
        program: { $ref: '#/components/schemas/Program' }
        updatedBy: { $ref: '#/components/schemas/User' }
        costCenters: { type: array, items: { $ref: '#/components/schemas/CostCenter' } }
        budgets: { type: array, items: { $ref: '#/components/schemas/Budget' } }
        parent: { $ref: '#/components/schemas/BudgetPlan' }
        children: { type: array, items: { $ref: '#/components/schemas/BudgetPlan' } }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, year, version, status, programId]
    BudgetPlanListItem:
      type: object
      properties:
        id: { type: integer }
        year: { type: integer }
        version: { type: number }
        scenarioName: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/BudgetPlanStatus' }
        totalInCents: { type: integer, format: int64 }
        program: { type: object, properties: { name: { type: string } } }
        countPartnerMunicipalities: { type: integer }
        countPartnerStates: { type: integer }
        updatedAt: { type: string, format: date-time }
        updatedBy: { type: object, properties: { name: { type: string } } }
        children: { type: array, items: { $ref: '#/components/schemas/BudgetPlanListItem' } }
    CreateBudgetPlan:
      type: object
      required: [year, programId]
      properties:
        year: { type: integer }
        programId: { type: integer, description: '⚠️ Obrigatório no backend.' }
        yearForImport: { type: integer, nullable: true }
        scenarioName: { type: string }
    CreateScenery:
      type: object
      required: [name, budgetPlanId]
      properties:
        name: { type: string }
        budgetPlanId: { type: integer }
    Insight:
      type: object
      properties:
        id: { type: integer }
        year: { type: integer }
        totalInCents: { type: integer, format: int64 }
        differenceValueInPercentage: { type: number }
        countPartnerMunicipalities: { type: integer }
        countPartnerStates: { type: integer }
        medInCentsForPartners: { type: integer, format: int64 }
        type: { type: string }
    ConsolidatedResult:
      type: object
      properties:
        data:
          type: object
          properties:
            costCenters:
              type: array
              items:
                type: object
                properties:
                  id: { type: integer }
                  name: { type: string }
                  valueInCents: { type: integer, format: int64 }
                  categories:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        name: { type: string }
                        valueInCents: { type: integer, format: int64 }
                        months:
                          type: array
                          items:
                            type: object
                            properties:
                              month: { type: integer, minimum: 1, maximum: 12 }
                              valueInCents: { type: integer, format: int64 }

    # ---------- Orçamentos ----------
    Budget:
      type: object
      properties:
        id: { type: integer }
        valueInCents: { type: integer, format: int64 }
        budgetPlanId: { type: integer }
        partnerStateId: { type: integer, nullable: true }
        partnerMunicipalityId: { type: integer, nullable: true }
        partnerState: { $ref: '#/components/schemas/PartnerState' }
        partnerMunicipality: { $ref: '#/components/schemas/PartnerMunicipality' }
        budgetResults: { type: array, items: { $ref: '#/components/schemas/BudgetResult' } }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, budgetPlanId]
    CreateBudget:
      type: object
      required: [budgetPlanId]
      properties:
        budgetPlanId: { type: integer }
        partnerStateId: { type: integer, nullable: true }
        partnerMunicipalityId: { type: integer, nullable: true }
    BudgetResult:
      type: object
      properties:
        id: { type: integer }
        month: { type: integer, minimum: 1, maximum: 12 }
        valueInCents: { type: integer, format: int64 }
        budgetId: { type: integer }
        costCenterSubCategoryId: { type: integer }
        costCenterCategoryId: { type: integer }
        data: { type: object, additionalProperties: true, description: 'Memória de cálculo bruta (JSON) do lançamento.' }

    # ---------- Resultados (memória de cálculo) ----------
    BudgetResultRootBase:
      type: object
      required: [budgetId, costCenterSubCategoryId, months]
      properties:
        budgetId: { type: integer }
        costCenterSubCategoryId: { type: integer }
    CreateBudgetResultIPCA:
      allOf:
        - $ref: '#/components/schemas/BudgetResultRootBase'
        - type: object
          properties:
            months:
              type: array
              minItems: 1
              maxItems: 12
              items:
                type: object
                required: [month, baseValueInCents, ipca]
                properties:
                  month: { type: integer, minimum: 1, maximum: 12 }
                  baseValueInCents: { type: integer, format: int64 }
                  ipca: { type: number }
                  justification: { type: string, nullable: true }
    CreateBudgetResultCAED:
      allOf:
        - $ref: '#/components/schemas/BudgetResultRootBase'
        - type: object
          properties:
            months:
              type: array
              minItems: 1
              maxItems: 12
              items:
                type: object
                required: [month, baseValueInCents, numberOfEnrollments]
                properties:
                  month: { type: integer, minimum: 1, maximum: 12 }
                  baseValueInCents: { type: integer, format: int64 }
                  numberOfEnrollments: { type: integer }
    CreateBudgetResultPersonal:
      allOf:
        - $ref: '#/components/schemas/BudgetResultRootBase'
        - type: object
          properties:
            months:
              type: array
              minItems: 1
              maxItems: 12
              items:
                type: object
                required: [month, education, employmentRelationship]
                properties:
                  month: { type: integer, minimum: 1, maximum: 12 }
                  education: { $ref: '#/components/schemas/Education' }
                  employmentRelationship: { $ref: '#/components/schemas/EmploymentRelationship' }
                  numberOfFinancialDirectors: { type: number }
                  salaryInCents: { type: integer, format: int64 }
                  salaryAdjustment: { type: number }
                  inssEmployer: { type: number }
                  inss: { type: number }
                  fgtsCharges: { type: number }
                  pisCharges: { type: number }
                  transportationVouchersInCents: { type: integer, format: int64 }
                  foodVoucherInCents: { type: integer, format: int64 }
                  healthInsuranceInCents: { type: integer, format: int64 }
                  lifeInsuranceInCents: { type: integer, format: int64 }
                  holidaysAndChargesInCents: { type: integer, format: int64 }
                  allowanceInCents: { type: integer, format: int64 }
                  thirteenthInCents: { type: integer, format: int64 }
                  fgtsInCents: { type: integer, format: int64 }
    CreateBudgetResultLogistics:
      allOf:
        - $ref: '#/components/schemas/BudgetResultRootBase'
        - type: object
          properties:
            months:
              type: array
              minItems: 1
              maxItems: 12
              items:
                type: object
                required: [month]
                properties:
                  month: { type: integer, minimum: 1, maximum: 12 }
                  accommodationInCents: { type: integer, format: int64 }
                  foodInCents: { type: integer, format: int64 }
                  transportInCents: { type: integer, format: int64 }
                  carAndFuelInCents: { type: integer, format: int64 }
                  airfareInCents: { type: integer, format: int64 }
                  numberOfPeople: { type: number }
                  dailyAccommodation: { type: number }
                  dailyFood: { type: number }
                  dailyTransport: { type: number }
                  dailyCarAndFuel: { type: number }
                  totalTrips: { type: number }

    # ---------- Centros de custo ----------
    CostCenter:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        type: { $ref: '#/components/schemas/CostCenterType' }
        active: { type: boolean }
        budgetPlanId: { type: integer }
        categories: { type: array, items: { $ref: '#/components/schemas/CostCenterCategory' } }
      required: [id, name, type, budgetPlanId]
    CreateCostCenter:
      type: object
      required: [name, type, budgetPlanId]
      properties:
        name: { type: string }
        type: { $ref: '#/components/schemas/CostCenterType' }
        budgetPlanId: { type: integer }
    CostCenterCategory:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        costCenterId: { type: integer }
        active: { type: boolean }
        subCategories: { type: array, items: { $ref: '#/components/schemas/CostCenterSubCategory' } }
      required: [id, name, costCenterId, active]
    CreateCostCenterCategory:
      type: object
      required: [name, costCenterId]
      properties:
        name: { type: string }
        costCenterId: { type: integer }
        subCategories:
          type: array
          items: { $ref: '#/components/schemas/CreateCostCenterSubCategory' }
    CostCenterSubCategory:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        type: { $ref: '#/components/schemas/SubCategoryType' }
        releaseType: { $ref: '#/components/schemas/SubCategoryReleaseType' }
        active: { type: boolean }
        costCenterCategoryId: { type: integer }
      required: [id, name, type, releaseType, costCenterCategoryId]
    CreateCostCenterSubCategory:
      type: object
      required: [name, type, releaseType, costCenterCategoryId]
      properties:
        name: { type: string }
        type: { $ref: '#/components/schemas/SubCategoryType' }
        releaseType: { $ref: '#/components/schemas/SubCategoryReleaseType' }
        costCenterCategoryId: { type: integer }

    # ---------- Compartilhamento ----------
    ShareBudgetPlan:
      type: object
      required: [budgetPlanId, emails]
      properties:
        budgetPlanId: { type: integer }
        emails: { type: array, minItems: 1, items: { type: string, format: email } }
    ShareConsolidatedResult:
      type: object
      required: [budgetPlanIds, emails]
      properties:
        budgetPlanIds: { type: array, minItems: 1, items: { type: integer } }
        emails: { type: array, minItems: 1, items: { type: string, format: email } }
    ValidateShareCredentials:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    # ---------- Relatórios ----------
    DueBetween:
      type: object
      properties:
        start: { type: string, format: date }
        end: { type: string, format: date }
    ReportFilters:
      type: object
      description: |
        Base de filtros de relatório. Enviado achatado: `dueBetween.start`, `dueBetween.end`, etc.
      properties:
        page: { type: integer }
        limit: { type: integer }
        search: { type: string, nullable: true }
        active: { type: integer, enum: [0, 1], nullable: true }
        order: { type: string, enum: [ASC, DESC] }
        budgetPlanId: { type: integer, nullable: true }
        dueBetween: { $ref: '#/components/schemas/DueBetween' }
        accountId: { type: integer, nullable: true }
        costCenterId: { type: integer, nullable: true }
        categoryId: { type: integer, nullable: true }
        subCategoryId: { type: integer, nullable: true }
        programId: { type: integer, nullable: true }
        entityId: { type: integer, nullable: true }
        status: { $ref: '#/components/schemas/ReportStatus' }
    CashflowRow:
      type: object
      properties:
        Category_id: { type: integer }
        Category_name: { type: string }
        SubCategory_id: { type: integer }
        SubCategory_name: { type: string }
        REALIZED: { type: number }
        EXPECTED: { type: number }
    PositionReport:
      type: object
      properties:
        itens:
          type: array
          items:
            type: object
            properties:
              costCenter:
                type: array
                items:
                  type: object
                  properties:
                    category: { type: array, items: { type: object, additionalProperties: true } }
              totalPendente: { type: number }
              totalPago: { type: number }
              totalAtrasado: { type: number }
    NoContractRow:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        total: { type: number }
        budgetPlan:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              name: { type: string }
              total: { type: number }
    AnalysisReport:
      type: object
      properties:
        totalValueOfPeriod: { type: number }
        data:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              name: { type: string }
              total: { type: number }
              itens:
                type: array
                items:
                  type: object
                  properties:
                    monthYear: { type: string }
                    total: { type: number }
              CostCenter: { type: array, items: { type: object, additionalProperties: true } }
    RealizedReport:
      type: object
      properties:
        totalExpected: { type: number }
        totalRealized: { type: number }
        totalProvisioned: { type: number }
        costCenters:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              name: { type: string }
              budgetPlanId: { type: integer }
              totalExpected: { type: number }
              totalRealized: { type: number }
              totalProvisioned: { type: number }
              categories:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer }
                    name: { type: string }
                    totalExpected: { type: number }
                    totalRealized: { type: number }
                    totalProvisioned: { type: number }
                    months:
                      type: array
                      items: { $ref: '#/components/schemas/RealizedMonth' }
                    subCategories:
                      type: array
                      items:
                        type: object
                        properties:
                          id: { type: integer }
                          name: { type: string }
                          totalExpected: { type: number }
                          totalRealized: { type: number }
                          totalProvisioned: { type: number }
                          months:
                            type: array
                            items: { $ref: '#/components/schemas/RealizedMonth' }
    RealizedMonth:
      type: object
      properties:
        month: { type: integer, minimum: 1, maximum: 12 }
        expected: { type: number }
        realized: { type: number }
        provisioned: { type: number }

    # ---------- Estatísticas ----------
    DashboardStatistics:
      type: object
      properties:
        totalExpenses: { type: number }
        expensesVariation: { type: string }
        expensesVariationSignal: { type: string, enum: ['+', '-'] }
        totalRevenue: { type: number }
        revenueVariation: { type: string }
        revenueVariationSignal: { type: string, enum: ['+', '-'] }
        nameTopFinancier: { type: string }
        totalTopFinanciers: { type: string }
        topFinanciersVariation: { type: string }
        topFinanciersVariationSignal: { type: string, enum: ['+', '-'] }
        nameTopCostCenter: { type: string }
        totalTopCostCentersExpenses: { type: number }
        topCostCentersVariation: { type: string }
        topCostCentersVariationExpensesSignal: { type: string, enum: ['+', '-'] }
        barChartCostCenterPayment:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              percentage: { type: number }
        noContractSuppliers:
          type: array
          items: { $ref: '#/components/schemas/NoContractRow' }
        lastPayments:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              dueDate: { type: string }
              backAccount: { type: string }
              value: { type: number }
        chartRealized:
          type: array
          items:
            type: object
            properties:
              month: { type: string }
              expected: { type: number }
              realized: { type: number }

    # ---------- Arquivos ----------
    CreateFilesMultipart:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items: { type: string, format: binary }
        payableId: { type: integer, nullable: true }
        receivableId: { type: integer, nullable: true }
        contractId: { type: integer, nullable: true }
        userId: { type: integer, nullable: true }
    UpdateFilesMultipart:
      allOf:
        - $ref: '#/components/schemas/CreateFilesMultipart'
        - type: object
          properties:
            currentFiles:
              type: array
              description: 'Itens já existentes (cada um JSON.stringify de { id, fileUrl }).'
              items:
                type: string
