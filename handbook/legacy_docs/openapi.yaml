      tags: [Planos Orçamentários]
      summary: Criar plano orçamentário
      description: '⚠️ DIVERGÊNCIA: `programId` é **obrigatório** no backend (contrato do front permitia null).'
      operationId: createBudgetPlan
      requestBody:
        required: true
