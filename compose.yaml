# ─────────────────────────────────────────────────────────────────────────────
# Docker Compose — ambiente de DESENVOLVIMENTO/HOMOLOGAÇÃO local
#
# Materializa simultaneamente:
#   - ADR-0019 — storage de documentos via MinIO (S3-compatível) em dev
#   - ADR-0020 — MySQL 8.4 como único dialeto (supersedes ADR-0018)
#   - ADR-0014 — isolamento por database `core`, charset utf8mb4_unicode_ci
#   - ADR-0011 — supply chain: digest pin + secrets via files (não env vars)
#
# Em produção este compose NÃO sobe — endpoints viram managed services
# (AWS S3, AWS RDS/Cloud SQL) com secrets vindo do Secrets Manager.
#
# Setup inicial (1 vez):
#   pnpm secrets:setup                         # gera ./secrets/*.txt (TS script)
#   docker compose up -d                       # sobe minio + mysql + bootstrap (só infra)
#
# Para CI (sem expor portas):
#   docker compose -f compose.yaml -f compose.ci.yaml up -d
#
# Profiles opt-in:
#   docker compose --profile app up -d         # adiciona o serviço `http` (servidor HTTP)
#   docker compose --profile workers up -d     # adiciona os 3 workers consolidados (grupos)
#   docker compose --profile jobs up -d        # adiciona jobs one-shot (sweeper, backfill)
#   docker compose --profile mail up -d        # adiciona mailpit (SMTP fake)
# ─────────────────────────────────────────────────────────────────────────────

name: core-api-dev

# ─────────────────────────────────────────────────────────────────────────────
# YAML Anchors — eliminam duplicação entre services de aplicação Node.
#
# Compose Specification §"Extension fields" permite `x-*` como extensões
# de nível top-level. Anchors YAML (`&`) + merge keys (`<<: *`) são suportados
# pelo parser do Docker Compose (Compose v2+). Referência: Compose file
# reference §"Top-level elements" → `extension`.
#
# x-app-build  — bloco build+image comum a TODOS os services da imagem
#                core-api (http, workers, jobs).
# x-worker-base — base para os 3 workers consolidados por grupo (restart+hardening+net+dep).
# x-job-base  — base para jobs one-shot (no restart, hardening máximo).
# ─────────────────────────────────────────────────────────────────────────────

x-app-build: &x-app-build
  build:
    context: .
    dockerfile: Dockerfile
    cache_from:
      - core-api:dev
  image: core-api:dev

x-worker-base: &x-worker-base
  <<: *x-app-build
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp
  networks:
    - core-api
  # Workers são processos long-running que consomem o banco. Dependem do `http`
  # healthy (que por sua vez depende do job `migrate` completar — o schema é
  # provisionado pelo migrate, não no boot), além do mysql healthy.
  # Garantia: schema migrado antes de qualquer worker processar mensagens.
  depends_on:
    mysql:
      condition: service_healthy
    http:
      condition: service_healthy

x-job-base: &x-job-base
  <<: *x-app-build
  restart: 'no'
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp
  networks:
    - core-api
  depends_on:
    mysql:
      condition: service_healthy

services:
  # ──────────────────────────────────────────────────────────────────────────
  # MinIO — equivalente local do AWS S3 (ADR-0019).
  # Licença AGPLv3: uso interno em dev/homologação NÃO dispara cláusulas
  # copyleft (ver ADR-0019 §"Análise de Licenciamento").
  # ──────────────────────────────────────────────────────────────────────────
  minio:
    # ADR-0011 §"Pin de versões" — digest pin do index multi-arch.
    # Para atualizar: docker buildx imagetools inspect minio/minio:latest --format '{{.Manifest.Digest}}'
    image: minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: core-api-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      # Credenciais via Docker secrets (ADR-0011 — sem default em texto).
      # MINIO_ROOT_USER_FILE / MINIO_ROOT_PASSWORD_FILE: suportadas pelo MinIO
      # desde ~2021. O MinIO lê o arquivo apontado e usa seu conteúdo como valor,
      # idêntico ao mecanismo _FILE das imagens oficiais Docker. Verificado
      # empiricamente: container subiu saudável com essas vars (issue #51, 2026-06-16).
      # Fonte: https://min.io/docs/minio/linux/reference/minio-server/settings/core.html
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MINIO_PROMETHEUS_AUTH_TYPE: public
    secrets:
      - minio_root_user
      - minio_root_password
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:9000/minio/health/ready']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    # Hardening — Compose reference §"Service-level elements". Impede que o
    # processo dentro do container ganhe novos privilégios via setuid/setgid.
    security_opt:
      - no-new-privileges:true
    networks:
      - core-api

  minio-bootstrap:
    # ADR-0011 §"Pin de versões" — digest pin do index multi-arch.
    # Para atualizar: docker buildx imagetools inspect minio/mc:latest --format '{{.Manifest.Digest}}'
    image: minio/mc:latest@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    container_name: core-api-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    # Credenciais lidas via $(cat /run/secrets/...) — NÃO interpoladas diretamente
    # no entrypoint para não vazar em `docker inspect`. O conteúdo do secret nunca
    # aparece nas env vars do container nem nos metadados do runtime (ADR-0011).
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $(cat /run/secrets/minio_root_user) $(cat /run/secrets/minio_root_password);
      mc mb --ignore-existing local/contracts-documents;
      mc version enable local/contracts-documents;
      mc anonymous set download local/contracts-documents;
      echo 'Bootstrap concluído: bucket contracts-documents pronto.';
      "
    secrets:
      - minio_root_user
      - minio_root_password
    restart: 'no'
    networks:
      - core-api

  # ──────────────────────────────────────────────────────────────────────────
  # MySQL 8.4 — engine único de persistência relacional (ADR-0020).
  #
  # Configuração canônica (charset, sql_mode, time zone, binlog, GTID, ACID
  # full) em ./docker/mysql/conf.d/server.cnf — montado read-only.
  #
  # Bootstrap (CREATE DATABASE core + users + grants + time zone tables) em
  # ./docker/mysql/initdb.d/*.sh — roda APENAS na primeira inicialização do
  # volume, convenção da imagem oficial mysql.
  #
  # Secrets via Docker Compose `secrets:` top-level — senhas como files em
  # /run/secrets/<name>, nunca env vars (não vaza em docker inspect).
  # Imagem oficial reconhece o sufixo _FILE para todas as senhas.
  # ──────────────────────────────────────────────────────────────────────────
  mysql:
    # ADR-0011 §"Pin de versões" — digest pin do index multi-arch (linux/amd64 + arm64v8).
    # Para atualizar: docker buildx imagetools inspect mysql:8.4 --format '{{.Manifest.Digest}}'
    image: mysql:8.4@sha256:c36050afdca850f23cef85703f84c7531a5ae155a11b5ee1c60acb09937c4084
    container_name: core-api-mysql
    restart: unless-stopped
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: core
      MYSQL_USER: ${MYSQL_USER:-core_app}
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_app_password
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
      - ./docker/mysql/initdb.d:/docker-entrypoint-initdb.d:ro
    secrets:
      - mysql_root_password
      - mysql_app_password
      - mysql_readonly_password
    healthcheck:
      # Login real com user de aplicação via TCP em 127.0.0.1 — não só
      # `mysqladmin ping` (que dá falso positivo durante init scripts ainda
      # rodando) e não via socket Unix default (que aceita conexões antes do
      # listener TCP estar pronto — `compose up --wait` retornaria prematuro
      # e quebraria a 1ª conexão do `mysql2` rodando no HOST via porta 3306
      # exposta, ver `tests/reports/CA-3-flakiness-investigation/`).
      test:
        - CMD-SHELL
        - >-
          mysql --protocol=tcp -h 127.0.0.1
          --user="$$MYSQL_USER"
          --password="$$(cat /run/secrets/mysql_app_password)"
          --execute="SELECT 1" "$$MYSQL_DATABASE"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Hardening — Compose reference §"Service-level elements".
    security_opt:
      - no-new-privileges:true
    networks:
      - core-api

  # ──────────────────────────────────────────────────────────────────────────
  # Mailpit — SMTP fake para DEV/teste de envio de e-mail (#135). Opt-in via profile `mail`.
  # SMTP em :1025, UI web em :8025. Ver handbook/infrastructure/08-email-delivery-runbook.md §8.
  #
  # Healthcheck: a imagem axllent/mailpit é construída sobre scratch/alpine minimal
  # e NÃO inclui curl, wget ou shell sh/bash — ferramentas HTTP externas não estão
  # disponíveis para probe. O binário /mailpit aceita o subcomando `readyz` que
  # responde com exit 0 quando o servidor está pronto (equivale ao endpoint /readyz
  # da API HTTP interna). Usando CMD direto no binário, sem shell wrapper.
  # Ref: Dockerfile reference §HEALTHCHECK — "The CMD form [...] executes the
  # command directly without a shell".
  # ──────────────────────────────────────────────────────────────────────────
  mailpit:
    # ADR-0011 §"Pin de versões" — digest pin. Atualizar:
    # docker buildx imagetools inspect axllent/mailpit:latest --format '{{.Manifest.Digest}}'
    image: axllent/mailpit:latest@sha256:56b1604f0624577991044e599cd3377a3d0a1265c3afdca3f1a552494134c563
    container_name: core-api-mailpit
    restart: unless-stopped
    profiles: ['mail']
    ports:
      - '${MAILPIT_SMTP_PORT:-1025}:1025'
      - '${MAILPIT_UI_PORT:-8025}:8025'
    environment:
      # DEV: aceita qualquer credencial SMTP sem TLS (o adapter Nodemailer autentica normalmente).
      MP_SMTP_AUTH_ACCEPT_ANY: '1'
      MP_SMTP_AUTH_ALLOW_INSECURE: '1'
    healthcheck:
      test: ['CMD', '/mailpit', 'readyz']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    networks:
      - core-api

  # ──────────────────────────────────────────────────────────────────────────
  # Servidor HTTP core-api (opt-in via profile `app`).
  #
  # Renomeado de `app` → `http` (Fase 4). O profile permanece `app` para
  # compatibilidade com o teste minio-compose.test.ts (CA-5) que usa
  # `--profile app` para ativar o serviço; o teste foi atualizado para
  # referenciar o nome `http`.
  #
  # CLI-RETIRE-EMBEDDED (ADR-0037): a CLI embutida foi removida. O ENTRYPOINT
  # da imagem é o servidor HTTP (`src/server.ts`). Este serviço sobe o HTTP real,
  # conectado ao MySQL (via secret file). NÃO migra no boot (applyMigrations:false,
  # CORE-MIGRATE-BOOT-INVERT) — depende do job `migrate` completar antes (depends_on).
  #
  # Injeção de secrets: workers NÃO suportam *_DATABASE_URL_FILE — usam o
  # padrão $(cat) via sh wrapper. O `http` também usa este padrão para
  # consistência e para garantir que tini permaneça como PID 1.
  #
  # Disparo: docker compose --profile app up -d http
  # ──────────────────────────────────────────────────────────────────────────
  http:
    <<: *x-app-build
    container_name: core-api-http
    profiles:
      - app
    # ⚠️ TODO módulo registrado no server.ts precisa do seu `*_DRIVER` AQUI. O server degrada para
    # in-memory EM SILÊNCIO quando o driver falta (HTTP 200 com lista vazia, sem log) — foi o que
    # deixou budget-plans (#374) e reports (#444) mudos em produção. Ver #456 (fail-fast no boot).
    environment:
      NODE_ENV: development
      AUTH_DRIVER: mysql
      PROGRAMS_DRIVER: mysql
      CONTRACTS_DRIVER: mysql
      PARTNERS_DRIVER: mysql
      FINANCIAL_DRIVER: mysql
      BUDGET_PLANS_DRIVER: mysql
      # reports é read-only e não tem writer próprio: as URLs dele caem no *_DATABASE_URL do
      # módulo-fonte (server.ts:247-249) — basta o driver, sem secret novo.
      REPORTS_DRIVER: mysql
    # Injeção de DATABASE_URL via $(cat) — padrão ADR-0011. tini permanece PID 1.
    # `exec tini -- node src/server.ts` substitui o sh pelo processo node após
    # exportar as envs, mantendo sinalização correta (SIGTERM → Node → graceful).
    entrypoint:
      - /bin/sh
      - -c
      - >-
        export AUTH_DATABASE_URL="$(cat /run/secrets/auth_database_url)";
        export PROGRAMS_DATABASE_URL="$(cat /run/secrets/programs_database_url)";
        export CONTRACTS_DATABASE_URL="$(cat /run/secrets/contracts_database_url)";
        export PARTNERS_DATABASE_URL="$(cat /run/secrets/partners_database_url)";
        export FINANCIAL_DATABASE_URL="$(cat /run/secrets/financial_database_url)";
        export BUDGET_PLANS_DATABASE_URL="$(cat /run/secrets/budget_plans_database_url)";
        exec tini -- node src/server.ts
    secrets:
      - auth_database_url
      - programs_database_url
      - contracts_database_url
      - partners_database_url
      - financial_database_url
      - budget_plans_database_url
    ports:
      - '${HTTP_PORT:-3000}:3000'
    # CA5 (issue #51): healthcheck explícito no compose — endpoint /health está em
    # src/shared/http/app.ts:185; porta default 3000 (src/shared/http/config.ts).
    # Probe via Node 24 fetch global (a imagem base não tem curl nem wget).
    # Alinhado ao HEALTHCHECK do Dockerfile (porta 3000, mesmo probe).
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    networks:
      - core-api
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ──────────────────────────────────────────────────────────────────────────
  # Workers long-running CONSOLIDADOS (opt-in via profile `workers`) — #407.
  #
  # Os 6 workers standalone viraram 3 processos por AFINIDADE, cada um rodando o
  # worker-runner (src/workers/runner/run.ts) selecionado por WORKER_GROUP. O
  # runner monta as factories do grupo sobre UM PoolRegistry (dedup por
  # connection-string) e roda os loops em Promise.allSettled — um worker que
  # rejeita não derruba os irmãos; SIGTERM/SIGINT abortam todos e o registry
  # drena os pools (graceful shutdown).
  #
  # Como todas as *_DATABASE_URL apontam para o MESMO RDS/db `core` (ADR-0014
  # isola por prefixo de tabela, não por conexão), cada grupo colapsa em 1 pool:
  # 9 pools/6 processos → 3 pools/3 processos contra max_connections=60
  # (Incident-0001, causa #2 — proliferação de pools).
  #
  # Todos herdam x-worker-base: imagem core-api:dev, restart unless-stopped,
  # hardening (no-new-privileges, cap_drop ALL, read_only, tmpfs /tmp), network
  # core-api, depends_on mysql+http healthy (schema migrado). WORKER_GROUP via
  # environment; DATABASE_URLs injetadas por wrapper sh + $(cat /run/secrets/...)
  # + exec tini. NODE_OPTIONS="--experimental-strip-types --no-warnings" herdado
  # do ENV da imagem. read_only: strip-types não grava em disco; mysql2 é JS puro.
  # ──────────────────────────────────────────────────────────────────────────

  # Grupo A — outbox (contracts + partners). 1 pool compartilhado.
  worker-outbox:
    <<: *x-worker-base
    profiles:
      - workers
    environment:
      WORKER_GROUP: outbox
      # Consumer-id por GRUPO (espelha o taskdef Fargate erp-prod-worker-outbox): label de
      # observabilidade compartilhado por contracts+partners. O claim do outbox é por-linha
      # (lock na tabela), não por consumer — compartilhar o id não afeta a corretude.
      OUTBOX_CONSUMER_ID: worker-outbox
    entrypoint:
      - /bin/sh
      - -c
      - >-
        export CONTRACTS_DATABASE_URL="$(cat /run/secrets/contracts_database_url)";
        export PARTNERS_DATABASE_URL="$(cat /run/secrets/partners_database_url)";
        exec tini -- node "$0"
      - src/workers/runner/run.ts
    secrets:
      - contracts_database_url
      - partners_database_url

  # Grupo B — projeções (supplier-view + payable-view + contract-count). 1 pool.
  # Single-instance por loop (FIFO por agregado — ver runbooks das projeções).
  worker-projections:
    <<: *x-worker-base
    profiles:
      - workers
    environment:
      WORKER_GROUP: projections
    entrypoint:
      - /bin/sh
      - -c
      - >-
        export CONTRACTS_DATABASE_URL="$(cat /run/secrets/contracts_database_url)";
        export PARTNERS_DATABASE_URL="$(cat /run/secrets/partners_database_url)";
        export FINANCIAL_DATABASE_URL="$(cat /run/secrets/financial_database_url)";
        exec tini -- node "$0"
      - src/workers/runner/run.ts
    secrets:
      - contracts_database_url
      - partners_database_url
      - financial_database_url

  # Grupo C — email-dispatch (isolado: SMTP externo pode travar/bloquear). 1 pool
  # (auth [+ partners, multi-fonte ADR-0047]). Contrato de e-mail (ADR-0010):
  # provider via env, igual nos 3 ambientes (EMAIL_PROVIDER=smtp). Defaults →
  # mailpit local (profile `mail`); QA/PROD sobrescrevem via env/Secrets Manager —
  # em PROD o host é o Amazon SES (email-smtp.<região>.amazonaws.com). SMTP_PASS é
  # secret. Sem as envs de e-mail, o runner aborta o worker no boot (fail-loud).
  worker-email:
    <<: *x-worker-base
    profiles:
      - workers
    environment:
      WORKER_GROUP: email
      EMAIL_PROVIDER: '${EMAIL_PROVIDER:-smtp}'
      EMAIL_FROM: '${EMAIL_FROM:-Dev <dev@local>}'
      SMTP_HOST: '${SMTP_HOST:-mailpit}'
      SMTP_PORT: '${SMTP_PORT:-1025}'
      SMTP_SECURE: '${SMTP_SECURE:-false}'
      # mailpit local não fala TLS; opt-out explícito do STARTTLS obrigatório (fail-secure).
      # PROD (SES) sobrescreve para desligar o opt-out e voltar ao default seguro.
      SMTP_REQUIRE_TLS: '${SMTP_REQUIRE_TLS:-false}'
      SMTP_USER: '${SMTP_USER:-dev@local}'
    entrypoint:
      - /bin/sh
      - -c
      - >-
        export AUTH_DATABASE_URL="$(cat /run/secrets/auth_database_url)";
        export PARTNERS_DATABASE_URL="$(cat /run/secrets/partners_database_url)";
        export SMTP_PASS="$(cat /run/secrets/smtp_pass)";
        exec tini -- node "$0"
      - src/workers/runner/run.ts
    secrets:
      - auth_database_url
      - partners_database_url
      - smtp_pass

  # ──────────────────────────────────────────────────────────────────────────
  # Job one-shot contracts-sweeper (opt-in via profile `jobs` — ADR-0041).
  #
  # Reutiliza a imagem `core-api:dev` (construída pelo serviço `http`). O ENTRYPOINT
  # da imagem é `tini -- node src/server.ts` — server.ts ESTÁ no entrypoint. Por isso
  # sobrescrevemos `entrypoint: [tini, --, node]` (PID 1 + runtime) e deixamos o
  # `command` apontar o script do job; sem o override, o `command` seria ANEXADO ao
  # server.ts (subiria o servidor, não o sweeper). NODE_OPTIONS=--experimental-strip-types
  # vem do ENV da imagem (herdado). Efetivo: `tini -- node src/jobs/.../run.ts`.
  #
  # O sweeper usa CONTRACTS_DATABASE_URL_FILE (suportado pelo sweeper — único service
  # que suporta este mecanismo nativo). Os demais jobs usam o padrão sh+$(cat).
  #
  # Disparo: `docker compose --profile jobs run --rm contracts-sweeper`
  # Em produção: agendado 1×/dia 00:05 America/Sao_Paulo via ERP-INFRA
  # (systemd timer / ofelia). Ver handbook/infrastructure/06-contracts-sweeper-job.md.
  #
  # restart:"no" — one-shot puro (ADR-0041 §2); retry = próximo tick do cron.
  # exit 78 (EX_CONFIG) ou exit 1 → alerta em ERP-INFRA; sem restart loop.
  # ──────────────────────────────────────────────────────────────────────────
  contracts-sweeper:
    <<: *x-job-base
    # SEM container_name fixo (M2): nome fixo + disparo sem --rm aborta o próximo run com
    # "name already in use" → o cron pararia de expirar SILENCIOSAMENTE. Docker gera nome
    # único por run; o --rm do disparo canônico limpa ao final.
    entrypoint: ['tini', '--', 'node']
    command: ['src/jobs/contracts/sweeper/run.ts']
    environment:
      CONTRACTS_DATABASE_URL_FILE: /run/secrets/contracts_database_url
    secrets:
      - contracts_database_url
    profiles:
      - jobs

  # ──────────────────────────────────────────────────────────────────────────
  # Job one-shot supplier-view-backfill (opt-in via profile `jobs`).
  #
  # Repopula o read-model fin_supplier_view a partir dos dados existentes em
  # partners. One-shot: run + exit; sem restart loop. Hardening máximo via
  # x-job-base (cap_drop ALL, read_only, tmpfs /tmp).
  #
  # SEM container_name fixo — mesmo motivo do contracts-sweeper (M2).
  # depends_on mysql healthy (via x-job-base) — não precisa do `http` pois
  # o backfill acessa o DB diretamente sem depender do servidor HTTP.
  #
  # Disparo: docker compose --profile jobs run --rm supplier-view-backfill
  # ──────────────────────────────────────────────────────────────────────────
  supplier-view-backfill:
    <<: *x-job-base
    profiles:
      - jobs
    entrypoint:
      - /bin/sh
      - -c
      - >-
        export PARTNERS_DATABASE_URL="$(cat /run/secrets/partners_database_url)";
        export FINANCIAL_DATABASE_URL="$(cat /run/secrets/financial_database_url)";
        exec tini -- node "$0"
      - src/jobs/financial/supplier-view-backfill/run.ts
    secrets:
      - partners_database_url
      - financial_database_url

  # ──────────────────────────────────────────────────────────────────────────
  # Job one-shot migrate (opt-in via profile `jobs` — CORE-MIGRATE-JOB Slice A).
  #
  # Aplica as migrations dos 6 módulos (auth, contracts, financial, notifications,
  # partners, programs) ANTES de subir http/workers. Roda `src/jobs/migrate/run.ts`,
  # que lê MIGRATE_DATABASE_URL como string direta (não suporta _FILE).
  #
  # Injeção via wrapper sh + $(cat) — padrão ADR-0011, igual aos demais workers.
  # tini como PID 1 garante sinalização correta (SIGTERM propagado ao Node).
  #
  # SEM container_name fixo — mesmo motivo do contracts-sweeper: nome fixo +
  # disparo sem --rm aborta o próximo run com "name already in use".
  #
  # Disparo: docker compose --profile jobs run --rm migrate
  # ──────────────────────────────────────────────────────────────────────────
  migrate:
    <<: *x-job-base
    profiles:
      - app
      - workers
      - jobs
    # $0 = src/jobs/migrate/run.ts (4º elemento do array entrypoint do wrapper sh).
    entrypoint:
      - /bin/sh
      - -c
      - >-
        export MIGRATE_DATABASE_URL="$(cat /run/secrets/migrate_database_url)";
        exec tini -- node "$0"
      - src/jobs/migrate/run.ts
    secrets:
      - migrate_database_url

# ────────────────────────────────────────────────────────────────────────────
# Top-level secrets — populados pelo scripts/setup/secrets.ts (pnpm run secrets:setup).
# Compose falha se algum arquivo estiver ausente (RED válido em W0 — CA-2).
# ────────────────────────────────────────────────────────────────────────────
secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt
  mysql_app_password:
    file: ./secrets/mysql_app_password.txt
  mysql_readonly_password:
    file: ./secrets/mysql_readonly_password.txt
  contracts_database_url:
    file: ./secrets/contracts_database_url.txt
  auth_database_url:
    file: ./secrets/auth_database_url.txt
  programs_database_url:
    file: ./secrets/programs_database_url.txt
  partners_database_url:
    file: ./secrets/partners_database_url.txt
  financial_database_url:
    file: ./secrets/financial_database_url.txt
  budget_plans_database_url:
    file: ./secrets/budget_plans_database_url.txt
  minio_root_user:
    file: ./secrets/minio_root_user.txt
  minio_root_password:
    file: ./secrets/minio_root_password.txt
  migrate_database_url:
    file: ./secrets/migrate_database_url.txt
  # SMTP do worker email-dispatch (Amazon SES em prod via Secrets Manager; mailpit em dev).
  smtp_pass:
    file: ./secrets/smtp_pass.txt

volumes:
  minio-data:
    name: core-api-minio-data
  mysql-data:
    name: core-api-mysql-data

networks:
  core-api:
    name: core-api
    driver: bridge
