# pnpm desabilita postinstall por padrão (supply-chain — ADR-0011).
# Liberar build apenas para deps auditadas. Ver handbook/reference/pnpm/settings.md#allowbuilds.
allowBuilds:
  # Transitive via drizzle-kit: baixa binário nativo no postinstall.
  esbuild: true
  # Em desuso (ADR-0020 §228, CTR-CLEANUP-SQLITE). Build nativo dispensável até a remoção.
  'better-sqlite3': false
  # Transitiva de @usebruno/cli (devDep de teste, ADR-0034). Build gera código gRPC/protobuf;
  # as coleções .bru são REST e o `bru run` roda sem ele. Mantido false (explícito/auditável).
  protobufjs: false

# Version overrides para security fixes (Dependabot alerts)
# - GHSA-67mh-4wv8-2f99: esbuild <=0.24.2 (via @esbuild-kit/core-utils@3.3.2 → esbuild@0.18.20)
# - GHSA-g7r4-m6w7-qqqr: esbuild >=0.27.3 <0.28.1 (via tsx@4.22.0 → esbuild@0.28.0)
# Resolve: forçar esbuild >=0.25.0 <0.27.3 || >=0.28.1 em todas as cadeias transitivas.
# Seguro: drizzle-kit@0.31.10 depende de esbuild@0.25.12 diretamente (compatível).
# Referência: handbook/reference/pnpm/settings.md:29-98 (section overrides).
#
# - GHSA-4c8g-83qw-93j6: fast-uri <3.1.3 — host confusion via IDN malformado
# - GHSA-v2hh-gcrm-f6hx: fast-uri <=3.1.3 — host confusion via '\' como delimitador de authority
#   Transitiva de runtime por 23 caminhos, todos sob fastify (ajv-compiler) e @fastify/swagger
#   (json-schema-resolver). Nenhum dep direto declara fast-uri: só override resolve.
# - GHSA-3jxr-9vmj-r5cp: brace-expansion <5.0.7 — DoS por expansão exponencial
#   Transitiva de runtime via @fastify/swagger-ui → @fastify/static → glob → minimatch.
#
# - GHSA-c96f-x56v-gq3h: find-my-way <=9.6.0 — DDoS via HTTP2. Transitiva de runtime via fastify
#   (router). fastify@5.8.5 pede `^9.0.0`; não existe 9.6.1, o patch está em 9.7.0. Override seguro
#   dentro do major 9.
# - GHSA-83w8-p2f5-377r: @fastify/static <=10.1.0 — route guard bypass. Transitiva via
#   @fastify/swagger-ui → @fastify/static (serve os assets do /docs). O patch é 10.1.1+, mas NENHUM
#   @fastify/swagger-ui (nem o latest 6.1.0) declara `@fastify/static ^10` — todos pedem `^9.1.2`.
#   Forçar o major 10 mesmo assim; a API de `register(root/prefix)` que o swagger-ui usa é estável
#   entre 9 e 10, validado por boot + fastify.inject do /docs (ver ticket #573).
overrides:
  esbuild: '>=0.25.0 <0.27.3 || >=0.28.1'
  fast-uri: '>=3.1.4 <4'
  brace-expansion: '>=5.0.7 <6'
  find-my-way: '^9.7.0'
  '@fastify/static': '^10.1.2'

# Supply-chain hardening explícito (ADR-0011 / ADR-0029). Mantemos os valores
# explícitos mesmo quando coincidem com o default do pnpm 11 — explícito é auditável.

# Quarentena de versões recém-publicadas. Default no pnpm 11 é 1440 (antes: 0).
# Ver handbook/reference/pnpm/settings.md#minimumreleaseage.
minimumReleaseAge: 1440
# Falha a resolução em vez de cair silenciosamente para versão não-madura.
# Ver handbook/reference/pnpm/settings.md#minimumreleaseagestrict (v11.0.0).
minimumReleaseAgeStrict: true
# Bloqueia instalação se o trust level de um pacote regrediu vs releases anteriores
# (vetor do incidente axios — ADR-0011). Ver settings.md#trustpolicy.
trustPolicy: no-downgrade
# Exceções cirúrgicas (por versão) à trustPolicy. Ver settings.md#trustpolicyexclude.
trustPolicyExclude:
  # Transitiva legítima de @types/node@22 (pacote de tipos do undici, mantido pelo
  # time do Node.js). O downgrade sinalizado é de evidência de provenance, não
  # takeover. Exceção fixada na versão para não afrouxar a política globalmente.
  # Avaliado em CTR-PNPM-11-MIGRATION (2026-05-30).
  - 'undici-types@6.21.0'
  # Transitivas de @usebruno/cli (devDep de teste, ADR-0034) via @babel/* → jscodeshift.
  # semver 6.3.1/5.7.2 sem attestation de provenance, mas mantidas por npm-cli-ops e são as
  # ULTIMAS de suas linhas major (dist-tags latest-6/legacy): downgrade de provenance, NAO
  # takeover — mesmo caso de undici-types acima. Selector ÚNICO com `||` (entradas separadas do
  # mesmo pacote não casam; ver settings.md#trustpolicyexclude). Avaliado em BRUNO-CLI-ADOPT.
  - 'semver@5.7.2 || 6.3.1'
# Transitivas só de fontes confiáveis (registry/workspace), nunca git/tarball exótico.
# Default no pnpm 11. Ver settings.md#blockexoticsubdeps.
blockExoticSubdeps: true
