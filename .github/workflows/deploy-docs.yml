name: Deploy do portal de docs (GitHub Pages)

# Publica o portal Docusaurus (website/) no GitHub Pages quando a main muda o website,
# ou sob demanda (workflow_dispatch). O deploy só roda na main — feature branches não publicam.
on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Permissões mínimas para o deploy-pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Uma publicação por vez; não cancela um deploy em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24 + corepack (pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable

      - name: Instala dependências (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build do site
        run: pnpm build

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v5

      - name: Sobe o artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publica no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
