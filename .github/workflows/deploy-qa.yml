name: deploy-qa

# Build da imagem de QA do core-api e publicação no GitHub Container Registry.
# Dispara em push na branch `dev` (a branch de QA deste repo). O deploy na VPS é
# push-based: após o build, este workflow entra na tailnet (Tailscale) e roda o
# `deploy.sh` na VPS via Tailscale SSH. A VPS de QA não tem mais IPv4 público
# (migrou p/ rede privada + IPv6 + Tailscale), por isso o runner alcança o host pelo
# IP da tailnet. Build pesado roda aqui no runner (a VPS de QA não compila —
# ver ERP-INFRA/platform/vps-qa).
#
# Versões das actions conferidas na doc oficial (jun/2026):
#   https://docs.github.com/en/actions/tutorials/publish-packages/publish-docker-images
#   https://github.com/docker/build-push-action

on:
  push:
    branches: [dev]
    paths-ignore:
      - '**/*.md'
      - 'handbook/**'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: deploy-qa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/erp-bem-comum/core-api

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # ADR-0011 §"Pin de versões" — pin por SHA (tag flutuante pode ser reescrita upstream).
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login no ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (tags + labels OCI)
        id: meta
        # Upgrade v5→v6.1.0: v5 roda em Node 20 (EOL 2026-03-24); v6 migra para Node 24.
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=qa
            type=sha,prefix=sha-,format=short

      - name: Build + push (linux/amd64, target runtime)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Manifesto simples (single-arch) — sem provenance/attestation.
          provenance: false

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      # A VPS de QA só é alcançável pela tailnet (não tem mais IPv4 público). O runner
      # entra na Tailscale com um auth key que carrega a tag:ci; a policy `ssh` da tailnet
      # concede `tag:ci → tag:cd-target` como `ubuntu` (action accept), então o deploy roda
      # via Tailscale SSH — autenticação por identidade da tailnet, sem chave SSH.
      # O auth key (secret TS_AUTHKEY) é reusable+ephemeral e expira a cada 90 dias:
      # renovar via `POST /api/v2/tailnet/-/keys` (tags:["tag:ci"]) + `gh secret set TS_AUTHKEY`.
      # Pin por SHA (ADR-0011 §"Pin de versões").
      - name: Conecta na tailnet (Tailscale)
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          ping: 100.91.155.0

      - name: Deploy QA via Tailscale SSH (roda deploy.sh no host)
        run: |
          # Se um container não ficar healthy, deploy.sh sai != 0 e este job fica vermelho.
          # Host = erp-bem-comum-qa na tailnet (100.91.155.0); IPv4 público 201.23.88.74 aposentado.
          tailscale ssh ubuntu@100.91.155.0 /opt/erp-qa/deploy.sh
