name: deploy-qa

# Build da imagem de QA do core-api e publicação no GitHub Container Registry.
# Dispara em push na branch `dev` (a branch de QA deste repo). O deploy na VPS é
# feito pelo Watchtower (pull-based): quando a tag :qa muda no ghcr, a VPS atualiza
# o container sozinha. Build pesado roda aqui no runner (a VPS de QA não compila —
# ver ERP-INFRA/platform/vps-qa).
#
# Versões das actions conferidas na doc oficial (jun/2026):
#   https://docs.github.com/en/actions/tutorials/publish-packages/publish-docker-images
#   https://github.com/docker/build-push-action

on:
  push:
    branches: [dev]
    paths-ignore:
      - '**/*.md'
      - 'handbook/**'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: deploy-qa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/erp-bem-comum/core-api

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # ADR-0011 §"Pin de versões" — pin por SHA (tag flutuante pode ser reescrita upstream).
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login no ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (tags + labels OCI)
        id: meta
        # Upgrade v5→v6.1.0: v5 roda em Node 20 (EOL 2026-03-24); v6 migra para Node 24.
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=qa
            type=sha,prefix=sha-,format=short

      - name: Build + push (linux/amd64, target runtime)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Manifesto simples (single-arch) — sem provenance/attestation.
          provenance: false

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy QA via SSH (forced command na VPS)
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # A chave está travada (forced command) p/ rodar só /opt/erp-qa/deploy.sh.
          # Se um container não ficar healthy, deploy.sh sai != 0 e este job fica vermelho.
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            ubuntu@201.23.88.74 deploy
