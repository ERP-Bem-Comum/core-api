name: audit

# Auditoria de vulnerabilidades conhecidas das dependências (supply-chain — ADR-0011).
# `pnpm audit` consulta o registry de advisories pela rede; por isso vive AQUI (CI),
# fora do gate W3 local (`pnpm test`/typecheck/lint), que é offline e determinístico.
#
# Dois níveis (issue #78):
#   - prod  (BLOCKING): só dependencies de runtime, falha em high/critical. Protege o
#            que vai a produção. Hoje verde (0 high/critical em --prod).
#   - full  (REPORT-ONLY): todas as deps, incluindo devDependencies de tooling (Bruno
#            etc.). Vulnerabilidades de ferramentas de teste não vão a runtime, então
#            dão visibilidade mas NÃO bloqueiam (continue-on-error).
#
# `--ignore-registry-errors`: se o registry de advisories estiver fora do ar, sai 0
# (não falha o build por indisponibilidade externa — anti-flaky).

on:
  pull_request:
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/audit.yml'
  schedule:
    # Diário 06:30 UTC (03:30 BRT) — pega advisories novos sem precisar de PR.
    - cron: '30 6 * * *'
  workflow_dispatch: {}

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prod:
    name: audit (produção — blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # ADR-0011 §"Pin de versões" — pin por SHA.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Habilita pnpm (corepack — packageManager pinado em package.json)
        run: |
          corepack enable
          corepack prepare pnpm@11.5.0 --activate
      - name: Audit (dependencies de runtime ≥ high)
        run: pnpm audit --prod --audit-level=high --ignore-registry-errors

  full:
    name: audit (todas as deps — report-only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Habilita pnpm (corepack — packageManager pinado em package.json)
        run: |
          corepack enable
          corepack prepare pnpm@11.5.0 --activate
      - name: Audit completo (visibilidade de devDependencies — não bloqueia)
        continue-on-error: true
        run: pnpm audit --audit-level=high --ignore-registry-errors
